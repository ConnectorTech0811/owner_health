services:

  backend:
    image: node:20-alpine
    container_name: owner_health_backend
    restart: always
    working_dir: /app
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: owner_health_frontend
    restart: always
    working_dir: /app
    ports:
      - "80:5173"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
