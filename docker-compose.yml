services:

  backend:
    build: ./backend
    container_name: owner_health_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: owner_health_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
